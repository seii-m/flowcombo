<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <title>FlowCombo</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- html2canvas（画像保存用） -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <!-- html2canvas（PDF保存用） -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>

  <!-- ──────────────── 共通ダイアログ ──────────────── -->
  <div id="fc-dialog" class="fc-dialog hidden">
    <div class="fc-dialog-box">
      <div id="fc-dialog-title" class="fc-dialog-title"></div>
      <div id="fc-dialog-buttons" class="fc-dialog-buttons"></div>
    </div>
  </div>
  
  <!-- ──────────────── ツールバー ──────────────── -->
  <div id="toolbar">
    <input id="flow-title" type="text" value="無題のフロー">

    <div class="toolbar-group">
      <button class="node-btn btn" data-node-type="start">始動</button>
      <button class="node-btn btn" data-node-type="action">行動</button>
      <button class="node-btn btn" data-node-type="check">確認</button>
    </div>

    <div class="toolbar-group">
      <!-- <button class="mode-btn btn" data-mode="view">閲覧</button> -->
      <button class="mode-btn btn" data-mode="edit">編集</button>
      <button class="mode-btn btn" data-mode="move">移動</button>
      <button class="mode-btn btn" data-mode="link">矢印</button>
      <button class="mode-btn btn danger" data-mode="delete">削除</button>
    </div>

    <div class="toolbar-group">
      <button id="align-btn" class="btn io-btn">整列</button>
      <button id="save-image-btn" class="btn io-btn">画像</button>
      <button id="export-btn" class="btn io-btn">保存</button>
      <button id="import-btn" class="btn io-btn">読込</button>
    </div>
  </div>

  <!-- ──────────────── キャンバス ──────────────── -->
  <div id="canvas"></div>

  <!-- ──────────────── JSON 読込欄 ──────────────── -->
  <textarea id="import-area"></textarea>
  <button id="copy-json-btn">コピー</button>
  <input id="file-input" type="file" accept="application/json" style="display:none">

  <!-- ──────────────── 広告欄 ──────────────── -->
  <div id="ad-area">広告</div>

  <!-- ──────────────── JS（分割後） ──────────────── -->
  <script src="js/core.js"></script>
  <script src="js/mode.js"></script>
  <script src="js/nodes.js"></script>
  <script src="js/arrows.js"></script>
  <script src="js/delete.js"></script>
  <script src="js/io.js"></script>
  <script src="js/align.js"></script>
  <script src="js/export-image.js"></script>
  <script src="js/dialog.js"></script>

</body>
</html>
