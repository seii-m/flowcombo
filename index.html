<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>FlowCombo - フロコン</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="toolbar">
    <button id="add-rect">アクション</button>
    <button id="add-circle">開始/終了</button>
    <button id="add-rounded">分岐</button>
    <button id="export-json">Export</button>
    <button id="import-json">Import</button>
  </div>

  <div id="canvas">
    <svg id="link-layer">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 Z" fill="#333" />
        </marker>
      </defs>
    </svg>
  </div>

  <div id="ad-area">
    <!-- 広告枠（後でAdSenseを入れる） -->
  </div>

  <script src="js/editor.js"></script>
</body>
</html>
