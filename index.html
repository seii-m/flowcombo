<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>FlowCombo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.ico">

  <!-- ★ manifest は head の中に置く -->
  <link rel="manifest" href="manifest.json">

  <!-- ★ service worker はルートに置くのが正解 -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</head>

<body>
  <!-- ツールバー -->
  <div id="toolbar">
    <input id="flow-title" placeholder="タイトルを入力" />

    <div class="toolbar-group">
      <button class="btn node-btn" data-node-type="start">始動</button>
      <button class="btn node-btn" data-node-type="action">行動</button>
      <button class="btn node-btn" data-node-type="check">確認</button>
    </div>

    <div class="toolbar-group">
      <button class="btn mode-btn" data-mode="view">閲覧</button>
      <button class="btn mode-btn" data-mode="edit">編集</button>
      <button class="btn mode-btn" data-mode="move">移動</button>
      <button class="btn mode-btn" data-mode="link">矢印</button>
      <button class="btn mode-btn danger" data-mode="delete">削除</button>
    </div>

    <div class="toolbar-group">
      <button class="btn io-btn" id="import-btn">読込</button>
      <button class="btn io-btn" id="export-btn">保存</button>
      <button class="btn io-btn" id="align-btn">整列</button>
    </div>
  </div>

  <div id="canvas"></div>

  <div id="ad-area">広告</div>

  <textarea id="import-area" placeholder="ここに JSON を貼り付けて読込ボタン"></textarea>

  <script src="js/editor.js"></script>
</body>
</html>
