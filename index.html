<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>FlowCombo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3996938703010668"
     crossorigin="anonymous"></script>  
  
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.ico">

  <!-- ★ manifest は head の中に置く -->
  <link rel="manifest" href="manifest.json">

  <!-- ★ service worker はルートに置くのが正解 -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</head>

<body>
  <!-- ツールバー -->
  <div id="toolbar">
    <input id="flow-title" placeholder="タイトルを入力" />

    <div class="toolbar-group">
      <button class="btn node-btn" data-node-type="start">始動</button>
      <button class="btn node-btn" data-node-type="action">行動</button>
      <button class="btn node-btn" data-node-type="check">確認</button>
    </div>

    <div class="toolbar-group">
      <!-- <button class="btn mode-btn" data-mode="view">閲覧</button> -->
      <button class="btn mode-btn" data-mode="edit">編集</button>
      <button class="btn mode-btn" data-mode="move">移動</button>
      <button class="btn mode-btn" data-mode="link">矢印</button>
      <button class="btn mode-btn danger" data-mode="delete">削除</button>
    </div>

    <div class="toolbar-group">
      <input type="file" id="file-input" accept="application/json" style="display:none;">
      <button class="btn io-btn" id="align-btn">整列</button>
      <button class="btn io-btn" id="import-btn">読込</button>
      <button class="btn io-btn" id="export-btn">保存</button>
      <button class="btn io-btn" id="save-image-btn">画像</button>
    </div>
  </div>

  <div id="canvas"></div>

  <!-- JSON 読込エリア（コピー付き） -->
  <div id="import-wrapper">
    <textarea id="import-area" placeholder="ここに JSON を貼り付けて読込ボタン"></textarea>
    <button id="copy-json-btn" type="button">コピー</button>
  </div>
  
  <script>
    document.getElementById("copy-json-btn").addEventListener("click", () => {
      const ta = document.getElementById("import-area");
      ta.select();
      document.execCommand("copy");
    });
  </script>
  
  <!-- 広告エリア -->
  <div id="ad-area">
    <!-- flowcombo_bottom_ad -->
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-3996938703010668"
         data-ad-slot="9604165145"
         data-ad-format="horizontal"
         data-full-width-responsive="true"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <script src="js/editor.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</body>
</html>
